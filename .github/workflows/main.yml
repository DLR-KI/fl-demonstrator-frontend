name: Main

on:
  - push
  - pull_request
  - workflow_dispatch

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
      - name: Install dependencies
        run: npm ci --silent
      - name: Run tests
        run: npm test --silent -- --coverage --passWithNoTests

  lint-doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
      - name: Install node dependencies
        run: npm install --no-save "markdownlint-cli2@0.22.0"
      - name: Start static code analysis
        run: npm run lint:doc --silent

  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create dummy requirements.txt
        run: touch requirements.txt
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.10"
      - name: Create virtual environment
        run: uv venv
      - name: Install dependencies
        run: uv pip install reuse
      - name: Start license check
        run: uv run reuse lint

  build-and-push-docker-image:
    needs: [tests, lint-doc, license-check]
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ contains(github.ref, 'main') || startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-pages:
    needs: [tests, lint-doc, license-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create dummy requirements.txt
        run: touch requirements.txt
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.10"
      - name: Create virtual environment
        run: uv venv
      - name: Install documentation dependencies
        run: uv pip install mkdocs-material
      - name: Build pages
        run: uv run mkdocs build
      - name: Fix permissions
        run: |
          chmod -c -R +rX "site/" | while read line; do
            echo "::warning title=Invalid file permissions automatically fixed::$line"
          done
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy-pages:
    if: contains(github.ref, 'main')
    needs: [build-pages]
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
